<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="360" rx="12" fill="url(#bg)"/>
  <text x="280" y="30" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Volcano Plot — Differential Expression</text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="80" y1="50" x2="80" y2="310" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="80" y1="310" x2="500" y2="310" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="290" y="340" text-anchor="middle" font-size="11" fill="#64748b">log₂ Fold Change</text>
  <text x="22" y="185" text-anchor="middle" font-size="11" fill="#64748b" transform="rotate(-90 22 185)">−log₁₀(adjusted p-value)</text>

  <!-- X axis ticks and labels -->
  <line x1="80" y1="310" x2="80" y2="316" stroke="#94a3b8" stroke-width="1"/>
  <text x="80" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">−4</text>
  <line x1="150" y1="310" x2="150" y2="316" stroke="#94a3b8" stroke-width="1"/>
  <text x="150" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">−3</text>
  <line x1="220" y1="310" x2="220" y2="316" stroke="#94a3b8" stroke-width="1"/>
  <text x="220" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">−1</text>
  <line x1="290" y1="310" x2="290" y2="316" stroke="#94a3b8" stroke-width="1"/>
  <text x="290" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">0</text>
  <line x1="360" y1="310" x2="360" y2="316" stroke="#94a3b8" stroke-width="1"/>
  <text x="360" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">+1</text>
  <line x1="430" y1="310" x2="430" y2="316" stroke="#94a3b8" stroke-width="1"/>
  <text x="430" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">+3</text>
  <line x1="500" y1="310" x2="500" y2="316" stroke="#94a3b8" stroke-width="1"/>
  <text x="500" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">+4</text>

  <!-- Y axis ticks -->
  <line x1="74" y1="280" x2="80" y2="280" stroke="#94a3b8" stroke-width="1"/>
  <text x="70" y="284" text-anchor="end" font-size="9" fill="#94a3b8">1</text>
  <line x1="74" y1="230" x2="80" y2="230" stroke="#94a3b8" stroke-width="1"/>
  <text x="70" y="234" text-anchor="end" font-size="9" fill="#94a3b8">2</text>
  <line x1="74" y1="180" x2="80" y2="180" stroke="#94a3b8" stroke-width="1"/>
  <text x="70" y="184" text-anchor="end" font-size="9" fill="#94a3b8">3</text>
  <line x1="74" y1="130" x2="80" y2="130" stroke="#94a3b8" stroke-width="1"/>
  <text x="70" y="134" text-anchor="end" font-size="9" fill="#94a3b8">4</text>
  <line x1="74" y1="80" x2="80" y2="80" stroke="#94a3b8" stroke-width="1"/>
  <text x="70" y="84" text-anchor="end" font-size="9" fill="#94a3b8">5</text>

  <!-- Significance thresholds -->
  <!-- Horizontal p-value threshold (padj = 0.05 → -log10 = 1.3) -->
  <line x1="80" y1="244" x2="500" y2="244" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="502" y="248" font-size="8" fill="#94a3b8">p=0.05</text>
  <!-- Vertical LFC thresholds -->
  <line x1="220" y1="50" x2="220" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="50" x2="360" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Non-significant dots (grey cloud) -->
  <circle cx="290" cy="295" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="275" cy="288" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="305" cy="285" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="265" cy="278" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="315" cy="275" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="255" cy="270" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="325" cy="268" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="248" cy="260" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="335" cy="258" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="243" cy="252" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="342" cy="250" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="283" cy="268" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="298" cy="272" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="271" cy="258" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="310" cy="262" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="260" cy="248" r="3" fill="#cbd5e1" opacity="0.7"/>
  <circle cx="330" cy="244" r="3" fill="#cbd5e1" opacity="0.7"/>

  <!-- Significant downregulated (left, purple) -->
  <circle cx="135" cy="195" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="120" cy="165" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="150" cy="175" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="105" cy="140" r="4" fill="#7c3aed" opacity="0.85"/>
  <circle cx="140" cy="148" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="115" cy="118" r="4" fill="#7c3aed" opacity="0.85"/>
  <circle cx="155" cy="128" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="98" cy="95" r="4.5" fill="#7c3aed"/>
  <circle cx="130" cy="98" r="4" fill="#7c3aed" opacity="0.9"/>
  <circle cx="110" cy="75" r="5" fill="#7c3aed"/>
  <circle cx="145" cy="82" r="4.5" fill="#7c3aed"/>
  <circle cx="88" cy="68" r="5" fill="#5b21b6"/>

  <!-- Significant upregulated (right, teal) -->
  <circle cx="425" cy="195" r="4" fill="#0d9488" opacity="0.8"/>
  <circle cx="440" cy="168" r="4" fill="#0d9488" opacity="0.8"/>
  <circle cx="410" cy="178" r="4" fill="#0d9488" opacity="0.8"/>
  <circle cx="455" cy="145" r="4" fill="#0d9488" opacity="0.85"/>
  <circle cx="420" cy="150" r="4" fill="#0d9488" opacity="0.8"/>
  <circle cx="445" cy="122" r="4" fill="#0d9488" opacity="0.85"/>
  <circle cx="405" cy="132" r="4" fill="#0d9488" opacity="0.8"/>
  <circle cx="462" cy="98" r="4.5" fill="#0d9488"/>
  <circle cx="430" cy="100" r="4" fill="#0d9488" opacity="0.9"/>
  <circle cx="450" cy="78" r="5" fill="#0d9488"/>
  <circle cx="415" cy="85" r="4.5" fill="#0d9488"/>
  <circle cx="472" cy="65" r="5" fill="#0f766e"/>

  <!-- Labels -->
  <rect x="86" y="48" width="70" height="18" rx="4" fill="#7c3aed" opacity="0.1"/>
  <text x="121" y="61" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">Downregulated</text>

  <rect x="400" y="48" width="68" height="18" rx="4" fill="#0d9488" opacity="0.1"/>
  <text x="434" y="61" text-anchor="middle" font-size="9" font-weight="600" fill="#0d9488">Upregulated</text>

  <!-- Legend -->
  <circle cx="94" cy="345" r="4" fill="#7c3aed"/>
  <text x="102" y="349" font-size="9" fill="#64748b">Significant down (padj &lt; 0.05, |LFC| &gt; 1)</text>
  <circle cx="310" cy="345" r="4" fill="#0d9488"/>
  <text x="318" y="349" font-size="9" fill="#64748b">Significant up</text>
  <circle cx="420" cy="345" r="4" fill="#cbd5e1"/>
  <text x="428" y="349" font-size="9" fill="#64748b">Not significant</text>
</svg>
