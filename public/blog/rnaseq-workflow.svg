<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="800" height="140" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="gv" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="140" rx="12" fill="#f8fafc"/>

  <!-- Step boxes -->
  <!-- 1 -->
  <rect x="12" y="30" width="100" height="80" rx="8" fill="url(#gv)" opacity="0.15"/>
  <rect x="12" y="30" width="100" height="80" rx="8" fill="none" stroke="url(#gv)" stroke-width="1.5"/>
  <text x="62" y="62" text-anchor="middle" font-size="22" fill="#7c3aed">🧬</text>
  <text x="62" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">RNA</text>
  <text x="62" y="96" text-anchor="middle" font-size="10" fill="#64748b">Extraction</text>

  <!-- arrow -->
  <line x1="114" y1="70" x2="130" y2="70" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2 -->
  <rect x="132" y="30" width="100" height="80" rx="8" fill="url(#gv)" opacity="0.12"/>
  <rect x="132" y="30" width="100" height="80" rx="8" fill="none" stroke="url(#gv)" stroke-width="1.5"/>
  <text x="182" y="62" text-anchor="middle" font-size="22" fill="#7c3aed">📚</text>
  <text x="182" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Library</text>
  <text x="182" y="96" text-anchor="middle" font-size="10" fill="#64748b">Preparation</text>

  <!-- arrow -->
  <line x1="234" y1="70" x2="250" y2="70" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3 -->
  <rect x="252" y="30" width="100" height="80" rx="8" fill="url(#gv)" opacity="0.10"/>
  <rect x="252" y="30" width="100" height="80" rx="8" fill="none" stroke="url(#gv)" stroke-width="1.5"/>
  <text x="302" y="62" text-anchor="middle" font-size="22" fill="#7c3aed">🔬</text>
  <text x="302" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Sequencing</text>
  <text x="302" y="96" text-anchor="middle" font-size="10" fill="#64748b">FASTQ output</text>

  <!-- arrow -->
  <line x1="354" y1="70" x2="370" y2="70" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4 -->
  <rect x="372" y="30" width="100" height="80" rx="8" fill="url(#gv)" opacity="0.10"/>
  <rect x="372" y="30" width="100" height="80" rx="8" fill="none" stroke="url(#gv)" stroke-width="1.5"/>
  <text x="422" y="62" text-anchor="middle" font-size="22" fill="#7c3aed">🗺️</text>
  <text x="422" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Alignment</text>
  <text x="422" y="96" text-anchor="middle" font-size="10" fill="#64748b">STAR / HISAT2</text>

  <!-- arrow -->
  <line x1="474" y1="70" x2="490" y2="70" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5 -->
  <rect x="492" y="30" width="100" height="80" rx="8" fill="url(#gv)" opacity="0.10"/>
  <rect x="492" y="30" width="100" height="80" rx="8" fill="none" stroke="url(#gv)" stroke-width="1.5"/>
  <text x="542" y="62" text-anchor="middle" font-size="22" fill="#7c3aed">📊</text>
  <text x="542" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Quantification</text>
  <text x="542" y="96" text-anchor="middle" font-size="10" fill="#64748b">Count matrix</text>

  <!-- arrow -->
  <line x1="594" y1="70" x2="610" y2="70" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6 -->
  <rect x="612" y="30" width="100" height="80" rx="8" fill="url(#gv)" opacity="0.10"/>
  <rect x="612" y="30" width="100" height="80" rx="8" fill="none" stroke="url(#gv)" stroke-width="1.5"/>
  <text x="662" y="62" text-anchor="middle" font-size="22" fill="#7c3aed">📈</text>
  <text x="662" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Diff. Expression</text>
  <text x="662" y="96" text-anchor="middle" font-size="10" fill="#64748b">DESeq2 / edgeR</text>

  <!-- arrow -->
  <line x1="714" y1="70" x2="730" y2="70" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7 -->
  <rect x="732" y="30" width="60" height="80" rx="8" fill="#2dd4bf" opacity="0.18"/>
  <rect x="732" y="30" width="60" height="80" rx="8" fill="none" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="762" y="62" text-anchor="middle" font-size="22" fill="#0d9488">🧩</text>
  <text x="762" y="82" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Pathway</text>
  <text x="762" y="96" text-anchor="middle" font-size="10" fill="#64748b">Analysis</text>
</svg>
